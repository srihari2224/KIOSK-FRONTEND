<!DOCTYPE html>
<html>
<head>
  <title>Kiosk Activated</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding-top: 80px; }
    button { padding: 15px 30px; font-size: 18px; background: #1abc9c; color: white; border: none; border-radius: 6px; }
  </style>
</head>
<body>

<button onclick="history.back()">⬅ Back</button>

<h1>Kiosk Activated</h1>
<p>Scan to upload files</p>

<div id="qr"></div>

<p id="url"></p>

<br/>
<button onclick="location.href='otp.html'">ACTIVATE</button>

<script>
const kioskId = localStorage.getItem("kioskId")

const uploadUrl = `https://pixel-livid-two.vercel.app/${kioskId}`

document.getElementById("url").innerText = uploadUrl

QRCode.toCanvas(document.getElementById("qr"), uploadUrl, { width: 260 })
</script>

</body>
</html>
